source_coop:
  region: us-west-2
  endpoint_url: ""
  bucket: us-west-2.opendata.source.coop
  product_prefix: rseg/long-lfmc-test/
  credentials_path: /home/users/trobinet/source_creds.txt
  verify_after_upload: true
  delete_extra_remote_files: false
  acl: none
  upload_backend: boto3
  boto3_max_workers: 16
  boto3_transfer_max_concurrency: 1
  boto3_match_mode: size
  boto3_single_part_threshold_gb: 5

datasets:
  example_lfmc_maps:
    description: Example LFMC map Zarr store for Source Cooperative upload.
    artifact_type: zarr
    source_path: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/inference/map_runs/lfmc_vh_vv_365_shared_dm128_2023_07_08/run_20260323_205249/merged/lfmc_maps.zarr
    destination_relpath: lfmc_maps.zarr
  scientific_lfmc_maps:
    description: Scientific EPSG:5070 LFMC Zarr store for Source Cooperative upload.
    artifact_type: zarr
    source_path: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/inference/final_products/lfmc_vh_vv_365_multisource_fusion_clim20_2001_2024.zarr
    destination_relpath: lfmc_maps.zarr
  viewer_3857_lfmc_maps:
    description: Derived EPSG:3857 viewer Zarr for the long LFMC web viewer.
    artifact_type: zarr
    source_path: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/viewer_3857/lfmc_maps_3857.zarr
    destination_relpath: viewer_3857/lfmc_maps_3857.zarr
    required_variables:
      - lfmc_ens_mean
      - lfmc_ens_std
      - quality_flag
      - dominant_landcover_code
      - lfmc_climatology_mean_tile
      - lfmc_climatology_mean_point
  viewer_3857_lfmc_maps_t32:
    description: Rechunked EPSG:3857 viewer Zarr with 32-day time chunks.
    artifact_type: zarr
    source_path: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/viewer_3857/lfmc_maps_3857_rechunk_t32.zarr
    destination_relpath: viewer_3857/lfmc_maps_3857_t32.zarr
    required_variables:
      - lfmc_ens_mean
      - lfmc_ens_std
      - quality_flag
      - dominant_landcover_code
      - lfmc_climatology_mean_tile
      - lfmc_climatology_mean_point
  viewer_3857_assets:
    description: Remote tile and manifest assets for the EPSG:3857 long LFMC web viewer.
    artifact_type: directory
    source_path: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/viewer_assets/web_mercator_3857
    destination_relpath: viewer_3857/assets/web_mercator_3857
    required_layers:
      - mean
      - anomaly
  rao_s1_scientific_lfmc_maps:
    description: Scientific EPSG:4326 Zarr for Rao S1-informed LFMC maps.
    artifact_type: zarr
    source_path: /oak/stanford/groups/konings/projects/rao_2020/data/source_products/rao_s1_lfmc.zarr
    destination_relpath: lfmc_maps.zarr
    required_variables:
      - lfmc
      - quality_flag
  rao_s1_viewer_3857_lfmc_maps:
    description: EPSG:3857 viewer Zarr for Rao S1-informed LFMC maps.
    artifact_type: zarr
    source_path: /oak/stanford/groups/konings/projects/rao_2020/data/source_products/viewer_3857/rao_s1_lfmc_3857.zarr
    destination_relpath: viewer_3857/lfmc_maps_3857.zarr
    required_variables:
      - lfmc
      - quality_flag
  rao_s1_viewer_3857_assets:
    description: Absolute LFMC tile and manifest assets for the Rao S1-informed viewer product.
    artifact_type: directory
    source_path: /oak/stanford/groups/konings/projects/rao_2020/data/source_products/viewer_3857/assets
    destination_relpath: viewer_3857/assets/web_mercator_3857
    required_layers:
      - lfmc
