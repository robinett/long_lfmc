    variable: lfmc_ens_mean
    label: LFMC
    unit: percent
    min: 40.0
    max: 220.0
    palette:
      - [109, 39, 27]
      - [202, 126, 74]
      - [208, 196, 135]
      - [109, 142, 96]
      - [37, 59, 54]
