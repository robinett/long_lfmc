dataset:
  dataset_label: Long LFMC Viewer 3857
  scientific_dataset_path: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/inference/final_products/lfmc_vh_vv_365_multisource_fusion_clim20_2001_2024.zarr
  scientific_grid_crs: EPSG:5070
  viewer_grid_crs: EPSG:3857
  viewer_grid_anchor_mode: source_extent_center
  viewer_sampling_method: nearest_source_cell
  display_variable: lfmc_ens_mean
  uncertainty_variable: lfmc_ens_std
  quality_variable: quality_flag
  landcover_variable: dominant_landcover_code
  initial_date: latest

output:
