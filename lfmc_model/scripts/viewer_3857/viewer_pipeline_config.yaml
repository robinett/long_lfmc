  state_dir: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/viewer_3857/state
  viewer_resolution_m: 500.0
  time_chunk_size: 1
  spatial_chunk_size: 256
  latlon_row_chunk_size: 256

batching:
  init_block_days: 180
  append_block_days: 180

tiles:
  tile_size: 512
  min_zoom: 0
  max_zoom: 3
  extra_view_resolutions:
    - 250.0
    - 125.0
    - 62.5
    - 31.25
    - 15.625
    - 7.8125

