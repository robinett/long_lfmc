paths:
  output_root: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/plots/paper_figures
  inputs_root: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/inputs
  gmba_basic_shapefile: /scratch/users/trobinet/long_lfmc/final_lfmc/gmba_mountins/GMBA_Inventory_v2.0_standard_basic/GMBA_Inventory_v2.0_standard_basic.shp

models:
  multitask:
    display_name: Multitask LFMC Model
    outputs_root: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/outputs/lfmc_vh_vv_365_ens
    input_data_name: ensemble/lfmc_vh_vv_365_ens
    is_ensemble: true
    model_num_tasks: 3
    color: "#cf5c36"
  single_task:
    display_name: Single-task LFMC Model
    outputs_root: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/outputs/lfmc_365_ens
    input_data_name: lfmc_365
    is_ensemble: true
    model_num_tasks: 3
    color: "#2f5d50"

filters:
  landcover_order:
    - shrub
    - evergreen_forest
    - deciduous_forest
    - grass

variability:
  min_obs: 10
  min_years: 5

plotting:
  dpi: 350
  fontsize: 14
  forward_batch_size: 4096

timeseries_cache:
  enabled: true
  rebuild: false
  cache_root:

timeseries_selection:
  r2_percentiles:
    good: 95
    average: 50
    poor: 5

figures:
  figure_1:
    enabled: false
    model_key: multitask
    num_sites_per_criterion: 1
    min_measurements: 10
    years_to_plot: 3
    criteria_order:
      - good
      - average
      - poor
    padding_days: 60
    plot_vv: false
    plot_vh: false
    figsize: [12.0, 10.5]
    filename: figure_02_multitask_timeseries.png
  supplementary_figure_1:
    enabled: false
    model_key: multitask
    hexbin_gridsize: 60
    figsize: [11.8, 5.2]
    filename: supplementary_figure_01_lfmc_vs_sar_obs.png
  supplementary_figure_2:
    enabled: false
    model_key: multitask
    num_sites_per_criterion: 1
    min_measurements: 10
    years_to_plot: 3
    criteria_order:
      - good
      - average
      - poor
    padding_days: 60
    plot_vv: true
    plot_vh: true
    figsize: [12.0, 10.5]
    filename: supplementary_figure_02_vv_vh_timeseries.png
  figure_2:
    enabled: false
    model_key: multitask
    hexbin_gridsize: 60
    figsize: [12.2, 11.3]
    filename: figure_03_performance_scatters.png
  figure_4:
    enabled: true
    model_key: multitask
    metric_colors:
      - "#cf5c36"
      - "#f4a259"
      - "#5b8e7d"
      - "#3d405b"
    figsize: [11.5, 5.6]
    filename: figure_04_landcover_breakdown.png
  supplementary_figure_3:
    enabled: false
    anchor_model_key: multitask
    model_keys:
      - multitask
      - single_task
    num_sites_per_criterion: 1
    min_measurements: 10
    criteria_order:
      - good
      - average
      - poor
    padding_days: 60
    figsize: [12.0, 10.5]
    filename: supplementary_figure_03_model_comparison_timeseries.png
  figure_6:
    enabled: true
    model_keys:
      - multitask
      - single_task
    figsize: [11.8, 13.2]
    filename: figure_05_landcover_model_comparison.png
