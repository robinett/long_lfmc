  validation_prediction_split: val
  interactive_validation_pipeline: false
  forward_batch_size: 2048
  use_cuda_autocast: true
  validation_site_n: 10
  array_concurrency: 128
  tasks_per_job: 40
  merge_blocks_per_job: 2
  use_gpu_forward: true
  dynamic_gpu_work_queue: true
  gpu_fine_tasks_per_job: 1
  gpu_max_jobs: 8
  gpu_lock_dir: /scratch/users/trobinet/long_lfmc/final_lfmc/lfmc_model/gpu_locks
  gpu_submit_sleep_seconds: 60
  gpu_time_limit: "12:00:00"
  gpu_cpus_per_task: 8
  gpu_mem: 36G
  serc_partition: serc
  owners_gpu_max_jobs: 300
  owners_partition: owners
  owners_gpu_time_limit: "12:00:00"
  owners_gpu_cpus_per_task: 8
  owners_gpu_mem: 36G
  gpu_max_retries: 20
  gpu_retry_states: PREEMPTED,REVOKED,BOOT_FAIL,NODE_FAIL,TIMEOUT,OUT_OF_MEMORY
  gpu_time_margin_seconds: 600
  gpu_claim_stale_seconds: 1800
  gpu_idle_sleep_seconds: 15
  gpu_next_task_safety_factor: 1.15
  max_prepared_ahead_of_completed_shards: 1000
  prepare_throttle_sleep_seconds: 30
  prepare_time_limit: "04:00:00"
  prepare_cpus_per_task: 8
  prepare_mem: 128G
  prepare_max_retries: 12
  prepare_retry_states: PREEMPTED,REVOKED,BOOT_FAIL,NODE_FAIL,TIMEOUT,OUT_OF_MEMORY
  delete_prepared_payload_after_shard_complete: true
  serc_only_endgame: true
  serc_endgame_minutes_threshold: 60
  serc_endgame_min_samples: 4
  serc_endgame_recent_completion_count: 32
  cleanup_prepared_tensors_after_success: false
  wait_for_validation_completion: true

product:
  tier: final
