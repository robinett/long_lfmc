name: Deploy viewer to GCS

on:
  push:
    branches:
      - main
    paths:
      - "old/viewer/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: old/viewer/frontend/package-lock.json

      - name: Install dependencies
        working-directory: old/viewer/frontend
        run: npm ci

      - name: Build
        working-directory: old/viewer/frontend
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Upload to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: old/viewer/frontend/dist
          destination: frontend-long-lfmc
          parent: false
          process_gcloudignore: false
